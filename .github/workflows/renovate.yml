name: Renovate

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.20
        with:
          # Prefer a dedicated RENOVATE_TOKEN; fall back to the existing PAT so the
          # runner works without an extra secret.
          token: ${{ secrets.RENOVATE_TOKEN || secrets.REPO_GHA_PAT }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
