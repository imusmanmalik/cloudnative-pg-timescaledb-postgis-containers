name: E2E (CNPG operand)

# Heavier gate (scheduled / on-demand): prove the image works as a real CloudNativePG
# operand - a kind cluster + CNPG operator + a Cluster CR that must reach healthy, then
# the PostGIS + TimescaleDB extension/functional checks run against the live primary.

on:
  schedule:
    - cron: 0 4 * * 1
  workflow_dispatch:
    inputs:
      target:
        description: "Bake target to exercise"
        default: postgis-3-17-standard-trixie
        type: string

permissions: {}

defaults:
  run:
    shell: "bash -Eeuo pipefail -x {0}"

jobs:
  e2e:
    name: E2E ${{ github.event.inputs.target || 'postgis-3-17-standard-trixie' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      TARGET: ${{ github.event.inputs.target || 'postgis-3-17-standard-trixie' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Fetch the CNPG source bake file
        run: |
          mkdir -p source
          curl -sSL https://raw.githubusercontent.com/cloudnative-pg/postgres-containers/main/docker-bake.hcl \
            -o source/docker-bake.hcl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Resolve image tag for the target
        run: |
          spec="$(docker buildx bake -f source/docker-bake.hcl -f docker-bake.hcl --print "$TARGET" 2>/dev/null)"
          # tags[1] is <pgFull>-<postgis>-<type>-<distro>, which carries a PostgreSQL
          # version CNPG can parse from spec.imageName (a bare ":e2e" tag is rejected).
          image="$(echo "$spec" | python3 -c "import sys,json;print(json.load(sys.stdin)['target']['$TARGET']['tags'][1])")"
          echo "IMAGE=$image" >> "$GITHUB_ENV"
          echo "Using image: $image"

      - name: Build image (amd64, load)
        run: |
          docker buildx bake -f source/docker-bake.hcl -f docker-bake.hcl "$TARGET" \
            --set '*.platform=linux/amd64' \
            --set '*.output=type=docker' \
            --provenance=false --sbom=false \
            --load

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0

      - name: Load image into kind
        run: kind load docker-image "$IMAGE" --name chart-testing

      - name: Install CNPG operator
        run: |
          TAG=$(curl -s https://api.github.com/repos/cloudnative-pg/cloudnative-pg/releases/latest | jq -r .tag_name)
          VER=${TAG#v}
          BRANCH="release-${VER%.*}"
          echo "Installing CNPG ${VER} (${BRANCH})"
          kubectl apply --server-side -f \
            "https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/${BRANCH}/releases/cnpg-${VER}.yaml"
          kubectl -n cnpg-system rollout status deployment/cnpg-controller-manager --timeout=300s

      - name: Create Cluster referencing the image
        run: |
          cat <<YAML | kubectl apply -f -
          apiVersion: postgresql.cnpg.io/v1
          kind: Cluster
          metadata:
            name: tsdb-postgis-e2e
          spec:
            instances: 1
            imageName: ${IMAGE}
            imagePullPolicy: Never
            postgresql:
              shared_preload_libraries:
                - timescaledb
            bootstrap:
              initdb:
                database: app
                owner: app
            storage:
              size: 1Gi
          YAML

      - name: Wait for the cluster to become healthy
        run: |
          kubectl wait --for=condition=Ready cluster/tsdb-postgis-e2e --timeout=600s || {
            kubectl describe cluster/tsdb-postgis-e2e || true
            kubectl get pods -o wide || true
            kubectl logs -l cnpg.io/cluster=tsdb-postgis-e2e --tail=200 || true
            exit 1
          }

      - name: Run extension + functional checks on the primary
        run: |
          PRIMARY=$(kubectl get pods -l 'cnpg.io/cluster=tsdb-postgis-e2e,cnpg.io/instanceRole=primary' -o name)
          kubectl exec "$PRIMARY" -c postgres -- psql -U postgres app -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION postgis;
          CREATE EXTENSION postgis_topology;
          CREATE EXTENSION timescaledb;
          CREATE EXTENSION timescaledb_toolkit;
          CREATE EXTENSION pgrouting;
          CREATE TABLE metrics(ts timestamptz NOT NULL, value double precision);
          SELECT create_hypertable('metrics', by_range('ts'));
          INSERT INTO metrics SELECT now() - (g || ' min')::interval, g FROM generate_series(1, 10) g;
          SELECT approx_percentile(0.5, percentile_agg(value))::numeric(10,2) FROM metrics;
          SELECT ST_AsText(ST_MakePoint(1, 2));
          SELECT extname, extversion FROM pg_extension ORDER BY extname;
          SQL

      - name: Teardown
        if: always()
        run: kubectl delete cluster/tsdb-postgis-e2e --ignore-not-found=true
